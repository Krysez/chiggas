    <style>
      :root {
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-right: env(safe-area-inset-right, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-inset-left: env(safe-area-inset-left, 0px);
        --app-viewport-width: 100vw;
        --app-viewport-height: 100dvh;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        overflow: hidden;
        background-color: #000000;
        font-family: Arial, Helvetica, sans-serif;
        touch-action: none;
        overscroll-behavior: none;

      }
      body {
        position: fixed;
        inset: 0;
      }
      #game-container {
        position: fixed;
        inset: 0;
        width: var(--app-viewport-width, 100vw);
        height: var(--app-viewport-height, 100dvh);
        min-height: 100svh;
        display: flex;
        justify-content: center;
        align-items: center;

      }

        display: block;

      }
    </style>
    <script>
      (() => {
        const root = document.documentElement;
        let lastW = 0;
        let lastH = 0;

        const updateViewportSize = () => {
          const vv = window.visualViewport;
          const width = Math.round(vv?.width || window.innerWidth || root.clientWidth || 0);
          const height = Math.round(vv?.height || window.innerHeight || root.clientHeight || 0);

          if (!width || !height) return;

          root.style.setProperty('--app-viewport-width', `${width}px`);
          root.style.setProperty('--app-viewport-height', `${height}px`);

          if (Math.abs(width - lastW) > 1 || Math.abs(height - lastH) > 1) {
            lastW = width;
            lastH = height;
            window.dispatchEvent(new CustomEvent('chiggasViewportResized', { detail: { width, height } }));
          }
        };

        updateViewportSize();
        window.addEventListener('resize', updateViewportSize, { passive: true });
        window.addEventListener('orientationchange', () => window.setTimeout(updateViewportSize, 80), { passive: true });
        window.visualViewport?.addEventListener('resize', updateViewportSize, { passive: true });
      })();
    </script>

<script>
    (() => {
        const splashRoot = document.getElementById('rosebud-exported-splash');
        if (!splashRoot) return;

        let isReady = false;
        let isMinimumVisibleTimeElapsed = false;
        let isHidden = false;

        const maybeHideSplash = () => {
            if (isHidden || !isReady || !isMinimumVisibleTimeElapsed) return;

            isHidden = true;
            splashRoot.classList.add('is-hiding');
            window.setTimeout(() => splashRoot.remove(), 500);
        };

        const markReady = () => {
            isReady = true;
            maybeHideSplash();
        };

        window.setTimeout(() => {
            isMinimumVisibleTimeElapsed = true;
            maybeHideSplash();
        }, 1000);

        if (document.readyState === 'complete') {
            markReady();
        } else {
            window.addEventListener('load', markReady, { once: true });
        }

        
    })();
</script><!-- CHIGGAS_CLEANUP_PASS_80A_REMOVE_ROSEBUD_SPLASH_SCRIPT_BEGIN -->
<script id="chiggas-cleanup-pass-80a-remove-rosebud-splash">
(() => {
    const removeRosebudSplash = () => {
        try {
            const splash = document.getElementById('rosebud-exported-splash');
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        } catch (_) {}
    };
    removeRosebudSplash();
    document.addEventListener('DOMContentLoaded', removeRosebudSplash);
    window.addEventListener('load', removeRosebudSplash);
    setTimeout(removeRosebudSplash, 0);
    setTimeout(removeRosebudSplash, 250);
})();
</script>
